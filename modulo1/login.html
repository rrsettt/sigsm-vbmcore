<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/estilo.css">
    <title>Iniciar Sesión</title>
</head>

<body>

    <header class="encabezado">

        <div class="logo">
            <a href="seguimiento.html">
                <img
                    src="../assets/img/Logo_Hc.png"
                    alt="Logo Hospital de Clínicas"
                >
            </a>
        </div>

        <div class="acciones-header">

            <a class="boton" href="seguimiento.html">
                ← Volver a Seguimiento
            </a>

        </div>

    </header>

    <main class="contenedor contenedor-simple">

        <section class="encuesta">

            <h2>Iniciar Sesión</h2>

            <form>

                <label for="usuario">
                    Usuario
                </label>

                <input
                    type="text"
                    id="usuario"
                    name="usuario"
                    class="campo"
                    placeholder="Ingrese su usuario"
                    required
                >

                <label for="password">
                    Contraseña
                </label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    class="campo"
                    placeholder="Ingrese su contraseña"
                    required
                >

                <button
                    type="submit"
                    class="boton"
                >
                    Ingresar
                </button>

            </form>

        </section>

    </main>

</body>
</html>
